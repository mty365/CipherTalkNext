name: oosmetrics 健康检查

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: 关闭旧的 oosmetrics Issue
        run: |
          REPO="${{ github.repository }}"
          OLD_ISSUES=$(gh issue list \
            --repo "$REPO" \
            --search "OosMetrics" \
            --state open \
            --json number \
            --jq '.[].number' \
            --limit 20)
          if [ -z "$OLD_ISSUES" ]; then
            echo "没有旧的 Issue 需要关闭"
            exit 0
          fi
          for NUM in $OLD_ISSUES; do
            echo "关闭旧 Issue #$NUM"
            gh issue unpin --repo "$REPO" "$NUM" 2>/dev/null || echo "  #$NUM 未固定或操作失败，跳过"
            gh issue close --repo "$REPO" "$NUM" 2>/dev/null || echo "  #$NUM 已关闭或操作失败，跳过"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: oosmetrics/health-check-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
